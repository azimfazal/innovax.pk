<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
    </style>
</head>
<body>
    <iframe id="contentFrame" title="Content"></iframe>

    <script>
        const frame = document.getElementById('contentFrame');
        
        function checkServerAndLoad() {
            // Try to load a tiny image from the server to test if it's accessible
            const testImg = new Image();
            
            testImg.onload = function() {
                // Server is accessible, load it in iframe
                console.log('Server is up');
                frame.src = 'http://182.191.88.78';
            };
            
            testImg.onerror = function() {
                // Server is down, load fallback
                console.log('Server is down');
                frame.src = 'firstpage.html';
            };
            
            // Add a random query param to prevent caching
            testImg.src = 'http://182.191.88.78/favicon.ico?' + Date.now();
        }
        
        // Initial check
        checkServerAndLoad();
        
        // Periodically check if server comes back
        setInterval(function() {
            const testImg = new Image();
            
            testImg.onload = function() {
                // Server is back, switch to it if we're on fallback
                if (frame.src.includes('firstpage.html')) {
                    console.log('Server is back, switching');
                    frame.src = 'http://182.191.88.78';
                }
            };
            
            testImg.src = 'http://182.191.88.78/favicon.ico?' + Date.now();
        }, 30000); // Check every 30 seconds
    </script>
</body>
</html>
