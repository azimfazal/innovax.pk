<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
    </style>
</head>
<body>
    <iframe id="contentFrame" title="Content"></iframe>

    <script>
        let usingFallback = false;
        
        function checkServerAndLoad() {
            const frame = document.getElementById('contentFrame');
            
            // Try to load the IP address first
            frame.src = 'http://182.191.88.78';
        }
        
        function handleIframeError() {
            const frame = document.getElementById('contentFrame');
            
            // If we're not already using the fallback and there's an error
            if (!usingFallback) {
                console.log('Server unavailable, switching to fallback page');
                usingFallback = true;
                frame.src = 'firstpage.html';
            }
        }
        
        function handleIframeLoad() {
            const frame = document.getElementById('contentFrame');
            
            // Check if we successfully loaded the IP address
            if (frame.src.includes('182.191.88.78')) {
                console.log('Successfully loaded server content');
                usingFallback = false;
            }
        }
        
        // Set up event listeners
        const frame = document.getElementById('contentFrame');
        frame.onerror = handleIframeError;
        frame.onload = handleIframeLoad;
        
        // Initial load
        checkServerAndLoad();
        
        // Periodically check if we're on fallback and server might be back
        setInterval(() => {
            if (usingFallback) {
                console.log('Checking if server is back online...');
                const currentSrc = frame.src;
                
                // Try to load the IP address again
                frame.src = 'http://182.191.88.78';
                
                // If it fails again, handleIframeError will switch back to firstpage.html
                // If it succeeds, handleIframeLoad will update usingFallback flag
            }
        }, 30000); // Check every 30 seconds
    </script>
</body>
</html>
