<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time-Based Content</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
    </style>
</head>
<body>
    <iframe id="contentFrame" title="Time-based content"></iframe>

    <script>
        function updateContent() {
            // Get current time in Pakistan (PKT - UTC+5)
            const now = new Date();
            
            // Convert to Pakistan time (UTC+5)
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const pakistanTime = new Date(utc + (3600000 * 5));
            
            const hours = pakistanTime.getHours();
            
            // Check if current time is between 8 AM (8) and 4 PM (16)
         //   const isDaytime = hours >= 8 && hours < 8;
            const isDaytime =0;
            
            const frame = document.getElementById('contentFrame');
            
            if (isDaytime) {
                // Between 8 AM and 4 PM - show the IP address
                frame.src = 'http://182.191.88.78';
            } else {
                // Outside 8 AM-4 PM - show firstpage.html
                frame.src = 'firstpage.html';
            }
        }
        
        // Update immediately
        updateContent();
        
        // Update every minute (to catch the hour change)
        setInterval(updateContent, 60000);
        
        // Handle iframe errors
        document.getElementById('contentFrame').onerror = function() {
            console.log('Error loading content');
        };
    </script>
</body>
</html>
