<!DOCTYPE html>
<html>
My innovax.pk page
<head>
    <title>Innovax</title>

    <script>
        function checkTimeAndRedirect() {

            // Get current time in Pakistan timezone
            const now = new Date();
            const pakistanTime = new Date(
                now.toLocaleString("en-US", { timeZone: "Asia/Karachi" })
            );

            const hour = pakistanTime.getHours();

            // Redirect between 8 AM and 4 PM
            if (hour >= 8 && hour < 16) {
                window.location.href = "182.191.88.78";
            }
        }

        // Run when page loads
        window.onload = checkTimeAndRedirect;
    </script>

</head>

<body style="text-align:center; margin-top:100px; font-family:Arial;">
    <h2>Welcome to Innovax</h2>
    <p>Office hours are 8:00 AM to 4:00 PM.</p>
    <p>Outside office hours, this page will remain visible.</p>
</body>

</html>
